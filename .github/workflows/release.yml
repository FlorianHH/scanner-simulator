name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path build/bin/scanner-simulator.exe -DestinationPath scanner-simulator-windows-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: scanner-simulator-windows-amd64
          path: scanner-simulator-windows-amd64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Package
        run: |
          cd build/bin
          ditto -c -k --sequesterRsrc --keepParent scanner-simulator.app ../../scanner-simulator-macos-amd64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: scanner-simulator-macos-amd64
          path: scanner-simulator-macos-amd64.zip

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build

      - name: Package
        run: tar -C build/bin -czf scanner-simulator-linux-amd64.tar.gz scanner-simulator

      - uses: actions/upload-artifact@v4
        with:
          name: scanner-simulator-linux-amd64
          path: scanner-simulator-linux-amd64.tar.gz

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            artifacts/scanner-simulator-windows-amd64/scanner-simulator-windows-amd64.zip
            artifacts/scanner-simulator-macos-amd64/scanner-simulator-macos-amd64.zip
            artifacts/scanner-simulator-linux-amd64/scanner-simulator-linux-amd64.tar.gz
