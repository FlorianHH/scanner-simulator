<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <svg class="brand-icon" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0"  y="0" width="2" height="20" fill="currentColor"/>
          <rect x="4"  y="0" width="1" height="20" fill="currentColor"/>
          <rect x="7"  y="0" width="3" height="20" fill="currentColor"/>
          <rect x="12" y="0" width="1" height="20" fill="currentColor"/>
          <rect x="15" y="0" width="2" height="20" fill="currentColor"/>
          <rect x="19" y="0" width="4" height="20" fill="currentColor"/>
          <rect x="25" y="0" width="1" height="20" fill="currentColor"/>
          <rect x="27" y="0" width="1" height="20" fill="currentColor"/>
        </svg>
        <h1>Scanner Simulator</h1>
      </div>
      <span class="header-badge">TCP</span>
    </div>
  </header>

  <main>
    <!-- Server Panel -->
    <section class="panel" id="panel-server">
      <h2><span class="section-num">01</span>Server</h2>
      <div class="row">
        <label for="port-input">Port</label>
        <input id="port-input" type="number" value="9000" min="1" max="65535" />
        <button id="btn-start" class="btn-primary">Start Listening</button>
        <button id="btn-stop" class="btn-danger" disabled>Stop</button>
      </div>
      <div class="status-row">
        <span id="status-dot" class="dot dot-idle"></span>
        <span id="status-text">Idle</span>
      </div>
    </section>

    <!-- Manual Send Panel -->
    <section class="panel" id="panel-manual">
      <h2><span class="section-num">02</span>Manual Send</h2>
      <div class="row">
        <label for="barcode-input">Barcode</label>
        <input id="barcode-input" type="text" placeholder="Enter barcode value" disabled />
        <button id="btn-send" class="btn-primary" disabled>Send</button>
      </div>
    </section>

    <!-- Batch Mode Panel -->
    <section class="panel" id="panel-batch">
      <h2><span class="section-num">03</span>Batch Mode</h2>
      <div class="row batch-controls">
        <label for="delay-input">Delay (ms)</label>
        <input id="delay-input" type="number" value="500" min="0" class="input-narrow" />
        <label class="checkbox-label">
          <input type="checkbox" id="loop-checkbox" disabled />
          Loop
        </label>
        <label for="loop-times-input" id="loop-times-label" class="hidden">Times</label>
        <input id="loop-times-input" type="number" min="0" placeholder="∞"
               class="input-narrow hidden" disabled />
        <button id="btn-batch-start" class="btn-primary" disabled>Start</button>
        <button id="btn-batch-stop" class="btn-danger" disabled>Stop</button>
      </div>
      <textarea id="batch-textarea" placeholder="One barcode per line" rows="5" disabled></textarea>
      <div id="batch-progress-row" class="progress-row hidden">
        <span id="batch-counter">0 / 0</span>
        <progress id="batch-bar" value="0" max="100"></progress>
      </div>
    </section>

    <!-- Range Mode Panel -->
    <section class="panel" id="panel-range">
      <h2><span class="section-num">04</span>Range Mode</h2>
      <div class="row range-controls">
        <label for="range-start">Start</label>
        <input id="range-start" type="text" inputmode="numeric"
               pattern="[0-9]*" placeholder="340012345000000001" disabled />
        <label for="range-count">Count</label>
        <input id="range-count" type="number" min="1" value="100"
               class="input-narrow" disabled />
        <label class="checkbox-label">
          <input type="checkbox" id="range-check-digit" checked disabled />
          Check digit
        </label>
        <button id="btn-range-start" class="btn-primary" disabled>Start</button>
        <button id="btn-range-stop" class="btn-danger" disabled>Stop</button>
      </div>
      <div class="row">
        <label for="range-delay">Delay (ms)</label>
        <input id="range-delay" type="number" value="0" min="0"
               class="input-narrow" disabled />
      </div>
      <div id="range-progress-row" class="progress-row hidden">
        <span id="range-counter">0 / 0</span>
        <progress id="range-bar" value="0" max="100"></progress>
      </div>
    </section>

    <!-- Activity Log Panel -->
    <section class="panel" id="panel-log">
      <div class="log-header">
        <h2><span class="section-num">05</span>Activity Log</h2>
        <button id="btn-clear" class="btn-ghost">Clear</button>
      </div>
      <ul id="log-list"></ul>
    </section>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
